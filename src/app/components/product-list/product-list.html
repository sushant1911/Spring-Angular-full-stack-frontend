
<div class="table-responsive">
  <table class="table table-striped table-hover">
    <thead class="table-dark">
      <tr>
        <th>SKU</th>
        <th>Name</th>
        <th>Description</th>
        <th>Price</th>
        <th>Status</th>
        <th>Units in Stock</th>
        <th>Image</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let product of products">
        <td>{{ product.sku }}</td>
        <td>{{ product.name }}</td>
        <td>{{ product.description }}</td>
        <td>{{ product.unitPrice | currency:'USD' }}</td>
        <td>
          <span [class.text-success]="product.active" [class.text-danger]="!product.active">
            {{ product.active ? 'Active' : 'Inactive' }}
          </span>
        </td>
        <td>{{ product.unitsInStock }}</td>
        <td>
          <img *ngIf="product.imageUrl" [src]="product.imageUrl" alt="{{ product.name }}" style="max-width: 50px; max-height: 50px;">
          <span *ngIf="!product.imageUrl">No Image</span>
        </td>
      </tr>
      <tr *ngIf="products.length === 0">
        <td colspan="7" class="text-center text-muted">
          No products available.
        </td>
      </tr>
    </tbody>
  </table>
</div>
